window_name: Screen Human Lab (CPU Fast)
capture:
  provider: mss
  monitor: 1
  target_fps: 10
  roi_size: 500
inference:
  backend: cpu
  model_path: models/yolo11n.onnx
  confidence_threshold: 0.35
  input_size: 640
overlay:
  enabled: true
  show_fps: true
  show_backend: true
  mode: overlay
  infer_only_while_right_mouse_down: true
  cursor_follow_speed: 4000.0
  cursor_follow_min_distance: 1.0
tracking:
  match_threshold: 0.45
  search_padding: 24
  max_search_padding: 56
  prediction_gain: 0.9
